<footer class="footer">
  <div class="hazard" aria-hidden="true"></div>
  <div
    class="container py-4 d-flex flex-column flex-md-row gap-3 justify-content-between align-items-md-center"
  >
    <div class="d-flex align-items-center gap-3">
      <span class="brand-badge font-display">AG</span>
      <div>
        <strong>AG Costruzioni</strong> — impresa edile<br />
        <small>{{ site.indirizzo }}</small>
      </div>
    </div>

    <nav class="footer-links" aria-label="Contatti rapidi">
      <a [href]="site.telefonoHref">{{ site.telefono }}</a>
      <a [href]="'https://wa.me/' + site.whatsapp" target="_blank" rel="noopener">WhatsApp</a>
      <a [href]="site.mapsUrl" target="_blank" rel="noopener">Indicazioni stradali</a>
    </nav>
  </div>
  <div class="container pb-3">
    <small class="copyright">© {{ anno }} AG Costruzioni · Forlimpopoli (FC)</small>
  </div>
</footer>
